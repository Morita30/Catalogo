<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frenos Dulanto - Catálogo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body> 

<div class="brand-bar"><img src="logo.png" alt="Logo" class="brand-logo"></div>

<div class="sticky-controls">
  <div class="header-controls">
    <input type="text" id="bus" class="search-input" placeholder="🔍 Buscar producto..." onkeyup="ejecutarFiltro()">
    <div class="selectors-row">
      <div class="menu-dropdown">
        <button class="btn-menu" id="btnCat" onclick="toggleMenu('mCat', 'btnCat', event)"><span>⚙️ <span id="lCat">Todas</span></span></button>
        <div class="menu-content" id="mCat">
          <div class="menu-item active" onclick="setFiltro('cat', 'todas', 'Todas', this, event)">Todas</div>
          <div class="menu-item" onclick="setFiltro('cat', 'pastilla', 'Pastillas', this, event)">Pastillas</div>
          <div class="menu-item" onclick="setFiltro('cat', 'disco', 'Discos', this, event)">Discos</div>
          <div class="menu-item" onclick="setFiltro('cat', 'zapata', 'Zapatas', this, event)">Zapatas</div>
        </div>
      </div>
      <div class="menu-dropdown">
        <button class="btn-menu" id="btnMar" onclick="toggleMenu('mMar', 'btnMar', event)"><span>🚗 <span id="lMar">Todas</span></span></button>
        <div class="menu-content" id="mMar">
          <div class="menu-item active" onclick="setFiltro('marca', 'todas', 'Todas', this, event)">Todas</div>
          <div class="menu-item" onclick="setFiltro('marca', 'toyota', 'Toyota', this, event)">Toyota</div>
          <div class="menu-item" onclick="setFiltro('marca', 'nissan', 'Nissan', this, event)">Nissan</div>
        </div>
      </div>
      <button class="btn-cart-header" id="btnCart" onclick="toggleCartModal(event)">🛒 <span class="badge-header" id="cartBadge">0</span></button>
    </div>
  </div>
</div> 

<div id="cartModal" style="display:none; position:fixed; top:140px; right:10px; width:300px; background:white; border-radius:20px; box-shadow:0 10px 40px rgba(0,0,0,0.3); z-index:10005; padding:15px; border:1px solid #eee;">
  <div style="font-weight:800; display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding-bottom:8px;"><span>Mi Pedido</span><span id="totalLabel">S/ 0</span></div>
  <div id="cartList"></div>
  <button style="background:var(--verde-wa); color:white; border:none; width:100%; padding:14px; border-radius:12px; font-weight:700; margin-top:10px;" onclick="sendWhatsApp()">WhatsApp</button>
</div> 

<div class="grid" id="contenedor"></div> 

<script src="database.js"></script>
<script>
  let cart = {}; let fCat = 'todas', fMarca = 'todas';

  function renderProductos() {
    const cont = document.getElementById('contenedor');
    cont.innerHTML = "";
    productosData.forEach((p, i) => {
      // Lógica de etiquetas dinámicas
      let badgeHtml = "";
      if(p.e === 'm') badgeHtml = `<div class="badge badge-best">Más vendido</div>`;
      if(p.e === 'o') badgeHtml = `<div class="badge badge-offer">Oferta</div>`;

      cont.innerHTML += `
        <div class="card" data-tipo="${p.c}" data-marca="${p.m}" data-full="${p.n} ${p.m}">
          ${badgeHtml}
          <div class="carousel-container" id="container-${i}" ontouchstart="handleTouchStart(event, ${i})" ontouchend="handleTouchEnd(event, ${i})">
            <div class="carousel-track" id="track-${i}" data-idx="1" data-cloning="false">
              <img src="${imgUrlBase}"><img src="${imgUrlBase}"><img src="${imgUrlBase}"><img src="${imgUrlBase}"><img src="${imgUrlBase}">
            </div>
          </div>
          <div class="brand-tag">${p.m}</div>
          <h3 style="font-size:12px; margin:3px 0; min-height:30px;">${p.n}</h3>
          <div class="price-tag">S/ ${p.p}.00</div>
          <button class="btn-add" onclick="addToCart('${p.n}', ${p.p}, event)">Añadir</button>
        </div>`;
    });
  }

  // --- CARRUSEL Y FILTROS ---
  function toggleMenu(mId, bId, e) {
    e.stopPropagation();
    const menu = document.getElementById(mId), btn = document.getElementById(bId);
    const showing = menu.classList.contains('show');
    document.querySelectorAll('.menu-content').forEach(m => m.classList.remove('show'));
    document.querySelectorAll('.btn-menu').forEach(b => b.classList.remove('open'));
    if(!showing) { menu.classList.add('show'); btn.classList.add('open'); }
  }

  function setFiltro(tipo, val, txt, el, e) {
    e.stopPropagation();
    if(tipo === 'cat') { fCat = val; document.getElementById('lCat').innerText = txt; }
    else { fMarca = val; document.getElementById('lMar').innerText = txt; }
    
    const btnId = (tipo === 'cat' ? 'btnCat' : 'btnMar');
    const btn = document.getElementById(btnId);
    if(val === 'todas') btn.classList.remove('active-filter'); else btn.classList.add('active-filter');

    document.querySelectorAll(`#m${tipo === 'cat' ? 'Cat' : 'Mar'} .menu-item`).forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.menu-content').forEach(m => m.classList.remove('show'));
    document.querySelectorAll('.btn-menu').forEach(b => b.classList.remove('open'));
    ejecutarFiltro();
  }

  function ejecutarFiltro() {
    const q = document.getElementById('bus').value.toLowerCase();
    document.querySelectorAll('.card').forEach(c => {
      const matchCat = (fCat === 'todas' || c.dataset.tipo === fCat);
      const matchMar = (fMarca === 'todas' || c.dataset.marca === fMarca);
      const matchBus = c.dataset.full.toLowerCase().includes(q);
      if(matchCat && matchMar && matchBus) c.classList.remove('hidden'); else c.classList.add('hidden');
    });
  }

  function addToCart(n, p, e) {
    if(cart[n]) cart[n].qty++; else cart[n] = {price:p, qty:1};
    updateUI();
  }

  function updateUI() {
    const list = document.getElementById('cartList');
    let t = 0, c = 0; list.innerHTML = "";
    for(const n in cart) {
      t += cart[n].price * cart[n].qty; c += cart[n].qty;
      list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px 0; font-size:12px;"><span>${n}</span><span>x${cart[n].qty}</span></div>`;
    }
    document.getElementById('cartBadge').innerText = c;
    document.getElementById('totalLabel').innerText = `S/ ${t}`;
  }

  function toggleCartModal(e) {
    e.stopPropagation();
    const m = document.getElementById('cartModal');
    m.style.display = m.style.display === 'block' ? 'none' : 'block';
  }

  window.onclick = () => {
    document.getElementById('cartModal').style.display = 'none';
    document.querySelectorAll('.menu-content').forEach(m => m.classList.remove('show'));
    document.querySelectorAll('.btn-menu').forEach(b => b.classList.remove('open'));
  };

  renderProductos();
</script>
</body>
</html>
