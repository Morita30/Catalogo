<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frenos Dulanto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="brand-bar"><img src="logo.png" class="brand-logo"></div>

<div class="sticky-controls">
    <input type="text" id="bus" class="search-input" placeholder="🔍 Buscar repuesto..." onkeyup="ejecutarFiltro()">
    <div class="selectors-row">
        <button class="btn-menu" id="btnCat">⚙️ <span id="lCat">Piezas</span></button>
        <button class="btn-menu" id="btnMar">🚗 <span id="lMar">Marcas</span></button>
        <button class="btn-cart-header" id="btnCart">🛒 <span id="cartBadge">0</span></button>
    </div>
</div>

<div class="grid" id="contenedor"></div>

<div class="modal-overlay" id="productModal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="modalBody"></div>
    </div>
</div>

<script src="database.js"></script>
<script src="script.js"></script>

</body>
</html>
